name: Generate Space Shooter Game

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"

  # This line allows you to trigger the action manually from the Actions tab
  workflow_dispatch:

  # run on every push on the master/main branch
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Generate Space Shooter Game
        uses: czl9707/gh-space-shooter@main
        with:
          # GitHub token used to fetch contributions
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/space-shooter.gif output/space-shooter.webp || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update space shooter game graph"
          git push origin HEAD:${GITHUB_REF_NAME}
